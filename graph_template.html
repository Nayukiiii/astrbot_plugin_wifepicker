<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
        {{ vis_js_content | safe }}
    </script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #FFF8FA 0%, #FFF0F5 50%, #FFE8EF 100%);
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }
        #network-container {
            width: 100%; height: calc(100vh - 80px); position: relative;
        }
        .header {
            width: 100%; height: 80px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: #FFFFFF;
            font-size: 30px; font-weight: bold;
            background: linear-gradient(135deg, #FFB7C5 0%, #E8A0BF 50%, #C85A7C 100%);
            z-index: 10; position: relative;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            letter-spacing: 3px;
            box-shadow: 0 3px 0 #FFD6E0;
        }
        .header::before { content: '🌸'; position: absolute; left: 20px; font-size: 24px; opacity: 0.6; }
        .header::after { content: '🌸'; position: absolute; right: 20px; font-size: 24px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="header">群 {{ group_name }} 今日老婆羁绊图谱</div>
    <div id="network-container"></div>

    <script>
        const hourlyTag = new Date().toISOString().slice(0, 13);
        const raw_data = {{ records | tojson }};
        const user_map = {{ user_map | tojson }} || {};
        const anime_wifes = {{ anime_wifes | tojson }} || {};
        const tongdan_pairs = {{ tongdan_pairs | tojson }} || [];
        const nodes = [];
        const edges = [];
        const userSet = new Set();

        raw_data.forEach(r => {
            const userName = user_map[r.user_id] || "用户" + r.user_id;
            const wifeName = user_map[r.wife_id] || r.wife_name;

            [{ id: r.user_id, name: userName }, { id: r.wife_id, name: wifeName }].forEach(u => {
                if (!userSet.has(u.id)) {
                    userSet.add(u.id);
                    nodes.push({
                        id: u.id, label: u.name,
                        shape: 'circularImage',
                        image: `https://q4.qlogo.cn/headimg_dl?dst_uin=${u.id}&spec=640&t=${hourlyTag}`,
                        borderWidth: 6, size: 110,
                        color: { border: '#C85A7C', background: '#FFF0F5' },
                        font: {
                            color: '#4A3F4B', size: 50, vadjust: 40,
                            strokeWidth: 6, strokeColor: '#FFFFFF',
                            bold: { color: '#4A3F4B', size: 44, vadjust: 40 }
                        }
                    });
                }
            });

            edges.push({
                from: r.user_id, to: r.wife_id,
                label: r.forced ? "强娶" : "抽中",
                arrows: { to: { enabled: true, scaleFactor: 3, type: 'arrow' } },
                color: { color: r.forced ? '#C85A7C' : '#FFB7C5', width: 4 },
                font: { align: 'middle', color: '#4A3F4B', size: 48, background: '#FFF8FA' },
                length: 700
            });
        });

        // 二次元老婆卫星节点：挂在每位群友旁边
        Object.entries(anime_wifes).forEach(([uid, info]) => {
            if (!userSet.has(uid)) return;
            const satId = '__anime_' + uid;
            nodes.push({
                id: satId, label: info.name || '二次元老婆',
                shape: 'circularImage', image: info.url,
                borderWidth: 4, size: 60,
                color: { border: '#8A6FB0', background: '#F5F0FF' },
                font: {
                    color: '#5A4F6B', size: 32, vadjust: 28,
                    strokeWidth: 4, strokeColor: '#FFFFFF'
                }
            });
            edges.push({
                from: uid, to: satId,
                dashes: [4, 6],
                color: { color: '#B099D6', width: 2 },
                length: 250,
                arrows: { to: { enabled: false } },
                smooth: false,
                physics: true
            });
        });

        // 本命同担染色边
        tongdan_pairs.forEach(p => {
            if (!userSet.has(p.a) || !userSet.has(p.b)) return;
            edges.push({
                from: p.a, to: p.b,
                label: `本命同担 ×${p.mult}`,
                dashes: [10, 8],
                color: { color: '#E8B547', width: 6 },
                font: { align: 'middle', color: '#7A5A0A', size: 36, background: '#FFF8E1' },
                arrows: { to: { enabled: false } },
                length: 600,
                smooth: { type: 'curvedCW', roundness: 0.3 }
            });
        });

        const container = document.getElementById('network-container');
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        const options = {
            nodes: { shape: 'circularImage', font: { face: 'Microsoft YaHei' } },
            edges: { smooth: { type: 'curvedCW', roundness: 0.2 } },
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -110000, centralGravity: 0.001,
                    springLength: 800, springConstant: 0.04,
                    damping: 0.09, avoidOverlap: 1
                },
                stabilization: {
                    enabled: true, iterations: {{ iterations }},
                    updateInterval: 25, onlyDynamicEdges: false, fit: true
                }
            }
        };
        const network = new vis.Network(container, data, options);
        network.once("stabilizationIterationsDone", function () { network.fit(); });
    </script>
</body>
</html>
