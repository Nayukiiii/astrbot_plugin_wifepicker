<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --gold:    #e8c97a;
    --gold2:   #f5e0a0;
    --silver:  #c8d0d8;
    --bronze:  #c8956a;
    --pink:    #f0607a;
    --pink-dim:#c84060;
    --bg:      #0c0810;
    --card-bg: rgba(255,255,255,0.035);
    --border:  rgba(255,255,255,0.07);
    --text:    #f0e8f0;
    --sub:     rgba(240,232,240,0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
    background: var(--bg);
    width: 520px;
    display: inline-block;
    position: relative;
    overflow: hidden;
  }

  /* ── 背景纹理层 ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,60,100,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(120,40,160,0.12) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; padding: 0 0 12px; }

  /* ── 顶部标题 ── */
  .header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  .header-eyebrow {
    font-size: 9px; letter-spacing: 6px;
    color: var(--pink); text-transform: uppercase; font-weight: 400;
  }
  .header-title {
    font-size: 24px; font-weight: 700;
    color: var(--text); letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(240,96,122,0.5);
  }
  .header-sub {
    font-size: 10px; color: var(--sub); letter-spacing: 2px;
  }
  /* 标题两侧装饰线 */
  .header::before, .header::after {
    content: '';
    position: absolute; bottom: -1px;
    width: 60px; height: 1px;
  }
  .header::before { left: 0; background: linear-gradient(90deg, transparent, var(--pink-dim)); }
  .header::after  { right: 0; background: linear-gradient(270deg, transparent, var(--pink-dim)); }

  /* ── 榜单项 ── */
  .item {
    display: flex; align-items: center;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: background 0.2s;
    min-height: 88px;
  }

  /* 前三名左侧彩色竖条 */
  .item.rank-1::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(to bottom, var(--gold), var(--gold2)); }
  .item.rank-2::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(to bottom, var(--silver), #e8eaec); }
  .item.rank-3::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(to bottom, var(--bronze), #dba882); }

  /* 第一名背景微光 */
  .item.rank-1 {
    background: linear-gradient(90deg, rgba(232,201,122,0.08) 0%, transparent 60%);
  }

  /* ── 名次数字 ── */
  .rank-num {
    width: 32px; flex-shrink: 0;
    text-align: center;
    font-size: 13px; font-weight: 700;
    margin-right: 4px;
  }
  .rank-1 .rank-num { color: var(--gold); font-size: 18px; text-shadow: 0 0 12px rgba(232,201,122,0.8); }
  .rank-2 .rank-num { color: var(--silver); font-size: 16px; }
  .rank-3 .rank-num { color: var(--bronze); font-size: 16px; }
  .rank-num.other { color: rgba(240,232,240,0.25); }

  /* ── 头像区 ── */
  .avatars {
    display: flex; align-items: center; gap: 0;
    margin: 0 14px 0 6px; flex-shrink: 0;
    position: relative;
  }
  .av-wrap {
    width: 46px; height: 46px;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .av-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .av-wrap.av-a {
    border: 1.5px solid rgba(240,96,122,0.5);
    box-shadow: 0 0 12px rgba(240,96,122,0.3);
    z-index: 2;
  }
  .av-wrap.av-b {
    border: 1.5px solid rgba(180,140,255,0.4);
    box-shadow: 0 0 12px rgba(180,140,255,0.2);
    margin-left: -10px; z-index: 1;
  }
  /* 第一名头像更大更亮 */
  .rank-1 .av-wrap { width: 52px; height: 52px; }
  .rank-1 .av-wrap.av-a { border-color: var(--gold); box-shadow: 0 0 18px rgba(232,201,122,0.5); }
  .rank-1 .av-wrap.av-b { border-color: rgba(232,201,122,0.5); }

  /* 中间心形 */
  .av-heart {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    width: 18px; height: 18px;
    background: var(--bg);
    border-radius: 50%;
    display: flex; align-items:center; justify-content:center;
    font-size: 10px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── 信息区 ── */
  .info { flex: 1; min-width: 0; }

  .cp-names {
    font-size: 14px; font-weight: 700;
    color: var(--text); letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .rank-1 .cp-names { color: var(--gold2); }

  .cp-date {
    font-size: 10px; color: var(--sub);
    letter-spacing: 1px; margin-bottom: 7px;
  }

  /* 进度条 */
  .bar-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    width: 100%;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--pink-dim), var(--pink));
  }
  .bar-fill.full {
    background: linear-gradient(90deg, #c84060, #f0607a, #ffd6e0);
    box-shadow: 0 0 6px rgba(240,96,122,0.6);
  }
  .rank-1 .bar-fill.full {
    background: linear-gradient(90deg, #c8a050, var(--gold), var(--gold2));
    box-shadow: 0 0 8px rgba(232,201,122,0.7);
  }

  /* ── 右侧数值 ── */
  .val-col {
    flex-shrink: 0; margin-left: 12px;
    text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .val-pct {
    font-size: 16px; font-weight: 700;
    color: var(--pink);
    letter-spacing: -0.5px;
  }
  .rank-1 .val-pct { color: var(--gold); text-shadow: 0 0 10px rgba(232,201,122,0.6); }

  /* 第一名专属BEST CP角标 */
  .best-badge {
    display: none;
    font-size: 8px; letter-spacing: 2px;
    color: var(--gold); border: 1px solid rgba(232,201,122,0.4);
    padding: 1px 5px; white-space: nowrap;
  }
  .rank-1 .best-badge { display: block; }

  /* ── 底部 ── */
  .footer {
    padding: 14px 0 6px;
    text-align: center;
    font-size: 9px; letter-spacing: 3px;
    color: rgba(240,232,240,0.2);
  }
  .footer-line {
    width: 60px; height: 1px; margin: 6px auto 0;
    background: linear-gradient(90deg, transparent, rgba(240,96,122,0.3), transparent);
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-eyebrow">Monthly Ranking</div>
    <div class="header-title">恩 爱 排 行</div>
    <div class="header-sub">{{ subtitle }}</div>
  </div>

  {% for r in ranking %}
  <div class="item rank-{{ r.rank if r.rank <= 3 else 'other' }}">

    <div class="rank-num {% if r.rank > 3 %}other{% endif %}">
      {% if r.rank == 1 %}①
      {% elif r.rank == 2 %}②
      {% elif r.rank == 3 %}③
      {% else %}{{ r.rank }}{% endif %}
    </div>

    <div class="avatars">
      <div class="av-wrap av-a">
        <img src="https://q4.qlogo.cn/headimg_dl?dst_uin={{ r.user_a }}&spec=100&t={{ r.rank }}1">
      </div>
      <div class="av-heart">♥</div>
      <div class="av-wrap av-b">
        <img src="https://q4.qlogo.cn/headimg_dl?dst_uin={{ r.user_b }}&spec=100&t={{ r.rank }}2">
      </div>
    </div>

    <div class="info">
      <div class="cp-names">{{ r.name_a }}  ×  {{ r.name_b }}</div>
      <div class="cp-date">{{ r.first_100_date }}  达成</div>
      <div class="bar-track">
        <div class="bar-fill {% if r.value >= 100 %}full{% endif %}" style="width:{{ r.value }}%"></div>
      </div>
    </div>

    <div class="val-col">
      <div class="val-pct">{{ r.value }}%</div>
      <div class="best-badge">BEST CP</div>
    </div>

  </div>
  {% endfor %}

  <div class="footer">
    好感度每月重置  ·  本月最速认定榜
    <div class="footer-line"></div>
  </div>

</div>
</body>
</html>
